<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password</title>
</head>
<body style="margin:0;padding:0;background:#f9fafb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f9fafb;padding:40px 20px;">
    <tr><td align="center">
      <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;">
        <tr><td style="padding:32px 32px 24px;text-align:center;">
          <div style="font-size:20px;font-weight:700;color:#111827;letter-spacing:-0.02em;">Astrologer</div>
        </td></tr>
        <tr><td style="padding:0 32px 16px;">
          <div style="width:100%;height:1px;background:#e5e7eb;"></div>
        </td></tr>
        <tr><td style="padding:0 32px 8px;">
          <h1 style="margin:0;font-size:18px;font-weight:600;color:#111827;">Reset your password</h1>
        </td></tr>
        <tr><td style="padding:0 32px 24px;">
          <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">
            We received a request to reset your password. Click the button below to choose a new one.
          </p>
        </td></tr>
        <tr><td style="padding:0 32px 24px;text-align:center;">
          <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:10px 28px;background:#111827;color:#ffffff;text-decoration:none;border-radius:8px;font-size:14px;font-weight:500;">Reset Password</a>
        </td></tr>
        <tr><td style="padding:0 32px 24px;">
          <p style="margin:0;font-size:12px;line-height:1.5;color:#9ca3af;">
            If you didn't request a password reset, you can safely ignore this email. Your password will remain unchanged.
          </p>
        </td></tr>
        <tr><td style="padding:16px 32px 24px;border-top:1px solid #e5e7eb;">
          <p style="margin:0;font-size:11px;color:#9ca3af;text-align:center;">Astrologer</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
